<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gurmukhi Smart Virtual Keyboard</title>
    <style>
        :root {
            --primary-bg: #f4f4f9;
            --keyboard-bg: #cfd2d6;
            --key-bg: #ffffff;
            --key-hover: #e8eaed;
            --key-active: #b5b5b5;
            --text-color: #333;
            --button-bg: #007bff;
            --button-hover: #0056b3;
            --addak-font: 'Gurmukhi MN', 'Raavi', sans-serif;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-size: 26px;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: 'Raavi', 'Gurmukhi MN', sans-serif;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        .action-btn {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }

        .action-btn:hover { background-color: var(--button-hover); }
        .action-btn.clear-btn { background-color: #dc3545; }
        .action-btn.clear-btn:hover { background-color: #c82333; }

        .keyboard {
            background-color: var(--keyboard-bg);
            padding: 10px;
            border-radius: 10px;
        }

        #main-keys, #symbol-keys {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .row-2 { padding-left: 20px; padding-right: 20px; }
        .row-3 { padding-left: 10px; padding-right: 10px; }

        .key {
            background-color: var(--key-bg);
            border: 1px solid #babbbc;
            border-bottom-width: 3px;
            border-radius: 6px;
            height: 55px;
            min-width: 0; 
            cursor: pointer;
            position: relative;
            user-select: none;
            -webkit-user-select: none; 
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #111;
        }

        .key:hover { background-color: var(--key-hover); }
        .key:active {
            background-color: var(--key-active);
            border-bottom-width: 1px;
            transform: translateY(2px);
        }

        .key .eng {
            position: absolute;
            top: 4px;
            left: 5px;
            font-size: 12px;
            color: #777;
            font-weight: bold;
        }

        .key .punj {
            font-size: 24px;
            font-weight: 600;
            margin-top: 8px;
            font-family: 'Raavi', 'Gurmukhi MN', sans-serif;
        }

        .symbol-key .punj {
            margin-top: 0;
            font-size: 22px;
        }

        .key.control {
            background-color: #abb2bf;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        
        .key.control:active { background-color: #9299a6; }
        
        .key.space { flex: 6; }
        .key.toggle-btn { flex: 2; }

        .key.shift-active {
            background-color: #838a96;
            color: white;
            border-bottom-width: 1px;
            transform: translateY(2px);
        }

        #key-addak .punj {
            font-family: var(--addak-font);
            font-size: 26px;
            margin-top: 6px;
        }

        /* =========================================
           MOBILE RESPONSIVENESS STYLES
           ========================================= */
        @media (max-width: 650px) {
            body { padding: 8px; }
            .container { padding: 10px; }
            h2 { font-size: 20px; margin-bottom: 10px; }
            
            textarea { 
                font-size: 22px; 
                height: 180px; /* Doubled height for mobile */
                padding: 10px; 
            }
            
            .action-btn { padding: 10px; font-size: 14px; }
            .keyboard { padding: 5px; }
            #main-keys, #symbol-keys { gap: 4px; }
            .key-row { gap: 2px; }
            .row-2 { padding-left: 10px; padding-right: 10px; }
            .row-3 { padding-left: 0px; padding-right: 0px; }
            
            .key { 
                height: 50px; /* 10% larger than previous 45px */
                border-radius: 4px; 
                border-bottom-width: 2px; 
            }
            
            .key .eng { font-size: 9px; top: 2px; left: 3px; }
            .key .punj { 
                font-size: 20px; /* 10% larger than previous 18px */
                margin-top: 6px; 
            }
            .symbol-key .punj { font-size: 20px; }
            .key.control { font-size: 13px; }
            #key-addak .punj { font-size: 22px; }
        }

        /* Ultra small screens */
        @media (max-width: 380px) {
            .key { height: 44px; /* 10% larger than previous 40px */ }
            .key .punj { font-size: 18px; }
            .symbol-key .punj { font-size: 18px; }
            .key .eng { display: none; } 
            .key.control { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gurmukhi Smart Keyboard</h2>
        
        <textarea id="punjabiInput" placeholder="ਇੱਥੇ ਟਾਈਪ ਕਰੋ..." autofocus inputmode="none"></textarea>
        
        <div class="action-buttons">
            <button class="action-btn" onclick="copyText()">Copy Text</button>
            <button class="action-btn clear-btn" onclick="clearText()">Clear</button>
        </div>

        <div class="keyboard" id="keyboard">
            
            <div id="main-keys">
                <div class="key-row">
                    <div class="key" data-lower="ੌ" data-upper="ਔ" data-eng-lower="q" data-eng-upper="Q" onclick="handleKeyClick(this)"><span class="eng">q</span><span class="punj">ੌ</span></div>
                    <div class="key" data-lower="ੈ" data-upper="ਐ" data-eng-lower="w" data-eng-upper="W" onclick="handleKeyClick(this)"><span class="eng">w</span><span class="punj">ੈ</span></div>
                    <div class="key" data-lower="ਾ" data-upper="ਆ" data-eng-lower="e" data-eng-upper="E" onclick="handleKeyClick(this)"><span class="eng">e</span><span class="punj">ਾ</span></div>
                    <div class="key" data-lower="ੀ" data-upper="ਈ" data-eng-lower="r" data-eng-upper="R" onclick="handleKeyClick(this)"><span class="eng">r</span><span class="punj">ੀ</span></div>
                    <div class="key" data-lower="ੂ" data-upper="ਊ" data-eng-lower="t" data-eng-upper="T" onclick="handleKeyClick(this)"><span class="eng">t</span><span class="punj">ੂ</span></div>
                    <div class="key" data-lower="ਬ" data-upper="ਭ" data-eng-lower="y" data-eng-upper="Y" onclick="handleKeyClick(this)"><span class="eng">y</span><span class="punj">ਬ</span></div>
                    <div class="key" data-lower="ਹ" data-upper="ਙ" data-eng-lower="u" data-eng-upper="U" onclick="handleKeyClick(this)"><span class="eng">u</span><span class="punj">ਹ</span></div>
                    <div class="key" data-lower="ਗ" data-upper="ਘ" data-eng-lower="i" data-eng-upper="I" onclick="handleKeyClick(this)"><span class="eng">i</span><span class="punj">ਗ</span></div>
                    <div class="key" data-lower="ਦ" data-upper="ਧ" data-eng-lower="o" data-eng-upper="O" onclick="handleKeyClick(this)"><span class="eng">o</span><span class="punj">ਦ</span></div>
                    <div class="key" data-lower="ਜ" data-upper="ਝ" data-eng-lower="p" data-eng-upper="P" onclick="handleKeyClick(this)"><span class="eng">p</span><span class="punj">ਜ</span></div>
                    <div class="key" data-lower="ਡ" data-upper="ਢ" data-eng-lower="[" data-eng-upper="{" onclick="handleKeyClick(this)"><span class="eng">[</span><span class="punj">ਡ</span></div>
                    <div class="key" data-lower="਼" data-upper="ਞ" data-eng-lower="]" data-eng-upper="}" onclick="handleKeyClick(this)"><span class="eng">]</span><span class="punj">਼</span></div>
                </div>
                
                <div class="key-row row-2">
                    <div class="key" data-lower="ੋ" data-upper="ਓ" data-eng-lower="a" data-eng-upper="A" onclick="handleKeyClick(this)"><span class="eng">a</span><span class="punj">ੋ</span></div>
                    <div class="key" data-lower="ੇ" data-upper="ਏ" data-eng-lower="s" data-eng-upper="S" onclick="handleKeyClick(this)"><span class="eng">s</span><span class="punj">ੇ</span></div>
                    <div class="key" data-lower="੍" data-upper="ਅ" data-eng-lower="d" data-eng-upper="D" onclick="handleKeyClick(this)"><span class="eng">d</span><span class="punj">੍</span></div>
                    <div class="key" data-lower="ਿ" data-upper="ਇ" data-eng-lower="f" data-eng-upper="F" onclick="handleKeyClick(this)"><span class="eng">f</span><span class="punj">ਿ</span></div>
                    <div class="key" data-lower="ੁ" data-upper="ਉ" data-eng-lower="g" data-eng-upper="G" onclick="handleKeyClick(this)"><span class="eng">g</span><span class="punj">ੁ</span></div>
                    <div class="key" data-lower="ਪ" data-upper="ਫ" data-eng-lower="h" data-eng-upper="H" onclick="handleKeyClick(this)"><span class="eng">h</span><span class="punj">ਪ</span></div>
                    <div class="key" data-lower="ਰ" data-upper="ੜ" data-eng-lower="j" data-eng-upper="J" onclick="handleKeyClick(this)"><span class="eng">j</span><span class="punj">ਰ</span></div>
                    <div class="key" data-lower="ਕ" data-upper="ਖ" data-eng-lower="k" data-eng-upper="K" onclick="handleKeyClick(this)"><span class="eng">k</span><span class="punj">ਕ</span></div>
                    <div class="key" data-lower="ਤ" data-upper="ਥ" data-eng-lower="l" data-eng-upper="L" onclick="handleKeyClick(this)"><span class="eng">l</span><span class="punj">ਤ</span></div>
                    <div class="key" data-lower="ਚ" data-upper="ਛ" data-eng-lower=";" data-eng-upper=":" onclick="handleKeyClick(this)"><span class="eng">;</span><span class="punj">ਚ</span></div>
                    <div class="key" data-lower="ਟ" data-upper="ਠ" data-eng-lower="'" data-eng-upper='"' onclick="handleKeyClick(this)"><span class="eng">'</span><span class="punj">ਟ</span></div>
                </div>

                <div class="key-row row-3">
                    <div class="key control shift-btn" style="flex: 1.5;" onclick="toggleShift()">Shift</div>
                    <div class="key" id="key-addak" data-lower="ੱ" data-upper="ੑ" data-eng-lower="z" data-eng-upper="Z" onclick="handleKeyClick(this)"><span class="eng">z</span><span class="punj">◌ੱ</span></div>
                    <div class="key" data-lower="ੰ" data-upper="ਂ" data-eng-lower="x" data-eng-upper="X" onclick="handleKeyClick(this)"><span class="eng">x</span><span class="punj">ੰ</span></div>
                    <div class="key" data-lower="ਮ" data-upper="ਣ" data-eng-lower="c" data-eng-upper="C" onclick="handleKeyClick(this)"><span class="eng">c</span><span class="punj">ਮ</span></div>
                    <div class="key" data-lower="ਨ" data-upper="ੳ" data-eng-lower="v" data-eng-upper="V" onclick="handleKeyClick(this)"><span class="eng">v</span><span class="punj">ਨ</span></div>
                    <div class="key" data-lower="ਵ" data-upper="ੲ" data-eng-lower="b" data-eng-upper="B" onclick="handleKeyClick(this)"><span class="eng">b</span><span class="punj">ਵ</span></div>
                    <div class="key" data-lower="ਲ" data-upper="ਲ਼" data-eng-lower="n" data-eng-upper="N" onclick="handleKeyClick(this)"><span class="eng">n</span><span class="punj">ਲ</span></div>
                    <div class="key" data-lower="ਸ" data-upper="ਸ਼" data-eng-lower="m" data-eng-upper="M" onclick="handleKeyClick(this)"><span class="eng">m</span><span class="punj">ਸ</span></div>
                    <div class="key" data-lower="," data-upper="।" data-eng-lower="," data-eng-upper="<" onclick="handleKeyClick(this)"><span class="eng">,</span><span class="punj">,</span></div>
                    <div class="key" data-lower="." data-upper="॥" data-eng-lower="." data-eng-upper=">" onclick="handleKeyClick(this)"><span class="eng">.</span><span class="punj">.</span></div>
                    <div class="key" data-lower="ਯ" data-upper="?" data-eng-lower="/" data-eng-upper="?" onclick="handleKeyClick(this)"><span class="eng">/</span><span class="punj">ਯ</span></div>
                    <div class="key control" style="flex: 1.5;" onclick="backspace()">⌫ Back</div>
                </div>

                <div class="key-row">
                    <div class="key control toggle-btn" onclick="toggleLayout()">?123</div>
                    <div class="key control space" onclick="insert(' ')">Space</div>
                </div>
            </div>

            <div id="symbol-keys" style="display: none;">
                <div class="key-row">
                    <div class="key symbol-key" data-lower="1" data-upper="੧" onclick="handleKeyClick(this)"><span class="punj">1</span></div>
                    <div class="key symbol-key" data-lower="2" data-upper="੨" onclick="handleKeyClick(this)"><span class="punj">2</span></div>
                    <div class="key symbol-key" data-lower="3" data-upper="੩" onclick="handleKeyClick(this)"><span class="punj">3</span></div>
                    <div class="key symbol-key" data-lower="4" data-upper="੪" onclick="handleKeyClick(this)"><span class="punj">4</span></div>
                    <div class="key symbol-key" data-lower="5" data-upper="੫" onclick="handleKeyClick(this)"><span class="punj">5</span></div>
                    <div class="key symbol-key" data-lower="6" data-upper="੬" onclick="handleKeyClick(this)"><span class="punj">6</span></div>
                    <div class="key symbol-key" data-lower="7" data-upper="੭" onclick="handleKeyClick(this)"><span class="punj">7</span></div>
                    <div class="key symbol-key" data-lower="8" data-upper="੮" onclick="handleKeyClick(this)"><span class="punj">8</span></div>
                    <div class="key symbol-key" data-lower="9" data-upper="੯" onclick="handleKeyClick(this)"><span class="punj">9</span></div>
                    <div class="key symbol-key" data-lower="0" data-upper="੦" onclick="handleKeyClick(this)"><span class="punj">0</span></div>
                </div>
                
                <div class="key-row row-2">
                    <div class="key symbol-key" data-lower="@" data-upper="~" onclick="handleKeyClick(this)"><span class="punj">@</span></div>
                    <div class="key symbol-key" data-lower="#" data-upper="`" onclick="handleKeyClick(this)"><span class="punj">#</span></div>
                    <div class="key symbol-key" data-lower="$" data-upper="€" onclick="handleKeyClick(this)"><span class="punj">$</span></div>
                    <div class="key symbol-key" data-lower="%" data-upper="£" onclick="handleKeyClick(this)"><span class="punj">%</span></div>
                    <div class="key symbol-key" data-lower="&" data-upper="¢" onclick="handleKeyClick(this)"><span class="punj">&</span></div>
                    <div class="key symbol-key" data-lower="-" data-upper="_" onclick="handleKeyClick(this)"><span class="punj">-</span></div>
                    <div class="key symbol-key" data-lower="+" data-upper="=" onclick="handleKeyClick(this)"><span class="punj">+</span></div>
                    <div class="key symbol-key" data-lower="(" data-upper="{" onclick="handleKeyClick(this)"><span class="punj">(</span></div>
                    <div class="key symbol-key" data-lower=")" data-upper="}" onclick="handleKeyClick(this)"><span class="punj">)</span></div>
                    <div class="key symbol-key" data-lower="/" data-upper="\" onclick="handleKeyClick(this)"><span class="punj">/</span></div>
                </div>

                <div class="key-row row-3">
                    <div class="key control shift-btn" style="flex: 1.5;" onclick="toggleShift()">Shift</div>
                    <div class="key symbol-key" data-lower="ੴ" data-upper="☬" onclick="handleKeyClick(this)"><span class="punj" style="font-size: 26px;">ੴ</span></div>
                    <div class="key symbol-key" data-lower="*" data-upper="^" onclick="handleKeyClick(this)"><span class="punj">*</span></div>
                    <div class="key symbol-key" data-lower="&quot;" data-upper="|" onclick="handleKeyClick(this)"><span class="punj">"</span></div>
                    <div class="key symbol-key" data-lower="'" data-upper="°" onclick="handleKeyClick(this)"><span class="punj">'</span></div>
                    <div class="key symbol-key" data-lower=":" data-upper=";" onclick="handleKeyClick(this)"><span class="punj">:</span></div>
                    <div class="key symbol-key" data-lower="!" data-upper="¡" onclick="handleKeyClick(this)"><span class="punj">!</span></div>
                    <div class="key symbol-key" data-lower="?" data-upper="¿" onclick="handleKeyClick(this)"><span class="punj">?</span></div>
                    <div class="key symbol-key" data-lower="<" data-upper="[" onclick="handleKeyClick(this)"><span class="punj"><</span></div>
                    <div class="key symbol-key" data-lower=">" data-upper="]" onclick="handleKeyClick(this)"><span class="punj">></span></div>
                    <div class="key control" style="flex: 1.5;" onclick="backspace()">⌫ Back</div>
                </div>

                <div class="key-row">
                    <div class="key control toggle-btn" onclick="toggleLayout()">ABC</div>
                    <div class="key control space" onclick="insert(' ')">Space</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const inputField = document.getElementById('punjabiInput');
        let isShifted = false;

        const keyMap = {
            'q': 'ੌ', 'w': 'ੈ', 'e': 'ਾ', 'r': 'ੀ', 't': 'ੂ', 'y': 'ਬ', 'u': 'ਹ', 'i': 'ਗ', 'o': 'ਦ', 'p': 'ਜ', '[': 'ਡ', ']': '਼',
            'Q': 'ਔ', 'W': 'ਐ', 'E': 'ਆ', 'R': 'ਈ', 'T': 'ਊ', 'Y': 'ਭ', 'U': 'ਙ', 'I': 'ਘ', 'O': 'ਧ', 'P': 'ਝ', '{': 'ਢ', '}': 'ਞ',
            'a': 'ੋ', 's': 'ੇ', 'd': '੍', 'f': 'ਿ', 'g': 'ੁ', 'h': 'ਪ', 'j': 'ਰ', 'k': 'ਕ', 'l': 'ਤ', ';': 'ਚ', "'": 'ਟ',
            'A': 'ਓ', 'S': 'ਏ', 'D': 'ਅ', 'F': 'ਇ', 'G': 'ਉ', 'H': 'ਫ', 'J': 'ੜ', 'K': 'ਖ', 'L': 'ਥ', ':': 'ਛ', '"': 'ਠ',
            'z': 'ੱ', 
            'x': 'ੰ', 'c': 'ਮ', 'v': 'ਨ', 'b': 'ਵ', 'n': 'ਲ', 'm': 'ਸ', ',': ',', '.': '.', '/': 'ਯ',
            'Z': 'ੑ', 'X': 'ਂ', 'C': 'ਣ', 'V': 'ੳ', 'B': 'ੲ', 'N': 'ਲ਼', 'M': 'ਸ਼', '<': '।', '>': '॥', '?': '?'
        };

        inputField.addEventListener('keydown', function(e) {
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                if (keyMap[e.key]) {
                    e.preventDefault(); 
                    insert(keyMap[e.key]); 
                }
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Shift' && !isShifted) toggleShift();
        });
        document.addEventListener('keyup', function(e) {
            if (e.key === 'Shift' && isShifted) toggleShift();
        });

        function insert(char) {
            const start = inputField.selectionStart;
            const end = inputField.selectionEnd;
            const text = inputField.value;
            inputField.value = text.substring(0, start) + char + text.substring(end);
            inputField.selectionStart = inputField.selectionEnd = start + char.length;
            inputField.focus();
        }

        function handleKeyClick(element) {
            const charToInsert = isShifted ? element.getAttribute('data-upper') : element.getAttribute('data-lower');
            insert(charToInsert);
            if (isShifted) {
                toggleShift();
            }
        }

        function toggleShift() {
            isShifted = !isShifted;
            const keys = document.querySelectorAll('.key[data-lower]'); 
            const shiftBtns = document.querySelectorAll('.shift-btn');
            
            keys.forEach(key => {
                const engSpan = key.querySelector('.eng');
                const punjSpan = key.querySelector('.punj');
                
                if (isShifted) {
                    if(engSpan) engSpan.textContent = key.getAttribute('data-eng-upper');
                    punjSpan.textContent = key.getAttribute('data-upper');
                } else {
                    if(engSpan) engSpan.textContent = key.getAttribute('data-eng-lower');
                    
                    if (key.id === 'key-addak') {
                        punjSpan.textContent = '◌' + key.getAttribute('data-lower');
                    } else {
                        punjSpan.textContent = key.getAttribute('data-lower');
                    }
                }
            });

            shiftBtns.forEach(btn => {
                if (isShifted) {
                    btn.classList.add('shift-active');
                } else {
                    btn.classList.remove('shift-active');
                }
            });
            inputField.focus();
        }

        function toggleLayout() {
            const mainKeys = document.getElementById('main-keys');
            const symKeys = document.getElementById('symbol-keys');

            if (isShifted) {
                toggleShift();
            }

            if (mainKeys.style.display === 'none') {
                mainKeys.style.display = 'flex';
                symKeys.style.display = 'none';
            } else {
                mainKeys.style.display = 'none';
                symKeys.style.display = 'flex';
            }
            inputField.focus();
        }

        function backspace() {
            const start = inputField.selectionStart;
            const end = inputField.selectionEnd;
            const text = inputField.value;

            if (start === end && start > 0) {
                inputField.value = text.substring(0, start - 1) + text.substring(end);
                inputField.selectionStart = inputField.selectionEnd = start - 1;
            } else if (start !== end) {
                inputField.value = text.substring(0, start) + text.substring(end);
                inputField.selectionStart = inputField.selectionEnd = start;
            }
            inputField.focus();
        }

        function copyText() {
            inputField.select();
            inputField.setSelectionRange(0, 99999);
            if (inputField.value.trim() === "") {
                alert("Nothing to copy!");
                return;
            }
            navigator.clipboard.writeText(inputField.value).then(() => {
                alert("Text copied to clipboard!");
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        function clearText() {
            if (confirm("Are you sure you want to clear the text?")) {
                inputField.value = "";
                inputField.focus();
            }
        }
    </script>
</body>
</html>
